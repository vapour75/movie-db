<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影视项目数据库</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #f5f7fb; padding: 16px; }
        .header { margin-bottom: 20px; }
        .header h1 { font-size: 24px; }
        .stats { display: flex; gap: 12px; margin-bottom: 20px; }
        .stat-card { background: white; border-radius: 12px; padding: 12px; flex: 1; text-align: center; }
        .stat-number { font-size: 24px; font-weight: bold; }
        .filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
        .filter-group { background: white; padding: 6px 12px; border-radius: 20px; border: 1px solid #ddd; }
        .filter-group select { border: none; background: none; }
        .reset-btn { background: #e2e8f0; border: none; padding: 6px 12px; border-radius: 20px; cursor: pointer; }
        .table-wrapper { overflow-x: auto; background: white; border-radius: 16px; }
        .project-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 1000px; }
        .project-table th, .project-table td { padding: 10px 8px; text-align: left; border-bottom: 1px solid #eee; }
        .project-table tr { cursor: pointer; }
        .level-badge { padding: 2px 8px; border-radius: 12px; font-size: 11px; }
        .level-S { background: #fef3c7; color: #b45309; }
        .level-A { background: #dbeafe; color: #1e40af; }
        .level-Aplus { background: #dcfce7; color: #166534; }
        .status-badge { padding: 2px 8px; border-radius: 12px; font-size: 10px; }
        .status-yibochu { background: #e0e7ff; color: #3730a3; }
        .fab { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; background: #1e293b; color: white; border-radius: 25px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; border: none; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: flex-end; justify-content: center; visibility: hidden; opacity: 0; transition: 0.2s; z-index: 200; }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-drawer { background: white; width: 100%; max-width: 600px; border-radius: 20px 20px 0 0; max-height: 80vh; overflow-y: auto; padding: 20px; transform: translateY(100%); transition: transform 0.3s; }
        .modal-overlay.active .modal-drawer { transform: translateY(0); }
        .form-group { margin-bottom: 12px; }
        .form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 8px; }
        .form-row { display: flex; gap: 12px; }
        .form-row .form-group { flex: 1; }
        .btn-submit { background: #1e293b; color: white; border: none; width: 100%; padding: 12px; border-radius: 40px; margin-top: 12px; cursor: pointer; }
        .button-group { display: flex; gap: 12px; margin-top: 16px; }
        .button-group button { flex: 1; }
        .loading { text-align: center; padding: 40px; color: #64748b; }
        .detail-block { background: #f8fafc; padding: 12px; border-radius: 12px; margin-bottom: 12px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎬 影视项目数据库</h1>
        <p>多人共享 · 实时同步</p>
    </div>
    <div class="stats" id="statsContainer"></div>
    <div class="filters">
        <div class="filter-group"><label>级别</label><select id="levelFilter"><option value="all">全部</option><option value="S">S级</option><option value="A+">A+级</option><option value="A">A级</option></select></div>
        <div class="filter-group"><label>状态</label><select id="statusFilter"><option value="all">全部</option><option value="已播出">已播出</option><option value="已杀青">已杀青</option><option value="已开机">已开机</option></select></div>
        <button class="reset-btn" id="resetFilters">重置</button>
    </div>
    <div class="table-wrapper">
        <table class="project-table">
            <thead><tr><th>剧目名称</th><th>级别</th><th>类型</th><th>集数</th><th>开机</th><th>播出日期</th><th>导演</th><th>编剧</th><th>主演</th><th>状态</th>?</thead>
            <tbody id="tableBody"><tr><td colspan="10" class="loading">加载数据中...</td></tr></tbody>
        </table>
    </div>
    <footer style="text-align:center; font-size:11px; margin-top:16px;">点击行查看详情 · 右下角+号添加</footer>
</div>
<button class="fab" id="addBtn">+</button>

<div id="editModal" class="modal-overlay">
    <div class="modal-drawer">
        <div style="display:flex; justify-content:space-between; margin-bottom:16px;"><span id="modalTitle" style="font-size:18px; font-weight:bold;">添加项目</span><button id="closeEditModalBtn" style="background:none; border:none; font-size:24px;">×</button></div>
        <div class="form-group"><label>剧目名称 *</label><input type="text" id="projName"></div>
        <div class="form-row"><div class="form-group"><label>级别</label><select id="projLevel"><option value="S">S级</option><option value="A+">A+级</option><option value="A">A级</option></select></div><div class="form-group"><label>类型</label><input type="text" id="projType"></div></div>
        <div class="form-row"><div class="form-group"><label>集数</label><input type="text" id="projEpisodes"></div><div class="form-group"><label>开机日期</label><input type="text" id="projStart"></div></div>
        <div class="form-row"><div class="form-group"><label>播出日期</label><input type="text" id="projAirDate"></div><div class="form-group"><label>杀青日期</label><input type="text" id="projEnd"></div></div>
        <div class="form-row"><div class="form-group"><label>导演</label><input type="text" id="projDirector"></div><div class="form-group"><label>编剧</label><input type="text" id="projWriter"></div></div>
        <div class="form-row"><div class="form-group"><label>男主</label><input type="text" id="projMale1"></div><div class="form-group"><label>女主</label><input type="text" id="projFemale1"></div></div>
        <div class="form-group"><label>出品/制作</label><input type="text" id="projStudio"></div>
        <div class="form-group"><label>豆瓣评分</label><input type="text" id="projRating" placeholder="如：8.5"></div>
        <button class="btn-submit" id="saveBtn">保存</button>
    </div>
</div>

<div id="detailModal" class="modal-overlay">
    <div class="modal-drawer">
        <div style="display:flex; justify-content:space-between;"><span style="font-size:18px; font-weight:bold;">项目详情</span><button id="closeDetailBtn" style="background:none; border:none; font-size:24px;">×</button></div>
        <div id="detailContent"></div>
        <div class="button-group"><button class="btn-submit" id="editDetailBtn" style="background:#3b82f6;">编辑</button><button class="btn-submit" id="deleteDetailBtn" style="background:#ef4444;">删除</button></div>
    </div>
</div>

<script>
    // Supabase 配置
    const SUPABASE_URL = "https://kcggqsgsgkmpuydrytcx.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable__TF7TumQQ-kpNdN-WF64DA_EjcsI0nn";
    
    // 只创建一次客户端
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let allProjects = [];
    let currentEditId = null;
    let currentFilter = "all";
    let statusFilter = "all";

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':m==='>'?'&gt;':m); }
    function getStatus(p) { if(p.air_date && p.air_date !== "") return "已播出"; if(p.end_date && p.end_date !== "") return "已杀青"; if(p.start_date && p.start_date !== "") return "已开机"; return "待开机"; }
    function getLevelClass(l) { if(l==="S") return "level-S"; if(l==="A+") return "level-Aplus"; if(l==="A") return "level-A"; return ""; }
    function getStatusClass(s) { if(s==="已播出") return "status-yibochu"; return ""; }

    async function loadData() {
        document.getElementById("tableBody").innerHTML = '<tr><td colspan="10" class="loading">加载数据中...</td></tr>';
        const { data, error } = await supabase.from("projects").select("*").order("id", { ascending: false });
        if(error) { 
            console.error(error); 
            document.getElementById("tableBody").innerHTML = '<tr><td colspan="10" class="loading">加载失败: ' + error.message + '</td></tr>';
            return; 
        }
        allProjects = data || [];
        updateStats();
        renderTable();
    }

    function updateStats() {
        let total = allProjects.length, kaiji=0, shaqing=0, yibochu=0;
        for(let p of allProjects) { let s=getStatus(p); if(s==="已播出") yibochu++; else if(s==="已杀青") shaqing++; else if(s==="已开机") kaiji++; }
        document.getElementById("statsContainer").innerHTML = '<div class="stat-card"><div class="stat-number">'+total+'</div><div>总项目</div></div><div class="stat-card"><div class="stat-number">'+kaiji+'</div><div>已开机</div></div><div class="stat-card"><div class="stat-number">'+shaqing+'</div><div>已杀青</div></div><div class="stat-card"><div class="stat-number">'+yibochu+'</div><div>已播出</div></div>';
    }

    function renderTable() {
        let filtered = allProjects.filter(p => {
            if(currentFilter !== "all" && p.level !== currentFilter) return false;
            if(statusFilter !== "all") { let s = getStatus(p); if(s !== statusFilter) return false; }
            return true;
        });
        if(filtered.length === 0) { document.getElementById("tableBody").innerHTML = '<tr><td colspan="10" class="loading">暂无数据</td></tr>'; return; }
        let html = "";
        for(let p of filtered) {
            let status = getStatus(p);
            let actors = [p.male1, p.female1].filter(x=>x).join(" / ");
            html += `<tr data-id="${p.id}">
                <td>${escapeHtml(p.name)}</td>
                <td><span class="level-badge ${getLevelClass(p.level)}">${p.level}级</span></td>
                <td>${escapeHtml(p.type || "-")}</td>
                <td>${escapeHtml(p.episodes || "-")}</td>
                <td>${p.start_date || "-"}</td>
                <td>${p.air_date || "-"}</td>
                <td>${escapeHtml(p.director || "-")}</td>
                <td>${escapeHtml(p.writer || "-")}</td>
                <td>${escapeHtml(actors)}</td>
                <td><span class="status-badge ${getStatusClass(status)}">${status}</span></td>
            </tr>`;
        }
        document.getElementById("tableBody").innerHTML = html;
        
        document.querySelectorAll("#tableBody tr").forEach(row => {
            row.onclick = () => {
                let id = parseInt(row.dataset.id);
                let proj = allProjects.find(p => p.id === id);
                if(proj) showDetail(proj);
            };
        });
    }

    function showDetail(p) {
        let status = getStatus(p);
        document.getElementById("detailContent").innerHTML = `
            <div class="detail-block"><h3>${escapeHtml(p.name)}</h3><div><span class="level-badge ${getLevelClass(p.level)}">${p.level}级</span> <span class="status-badge">${status}</span></div></div>
            <div class="detail-block"><strong>类型/集数</strong> ${escapeHtml(p.type||"-")} / ${p.episodes||"-"}<br><strong>开机/杀青/播出</strong> ${p.start_date||"-"} / ${p.end_date||"-"} / ${p.air_date||"-"}</div>
            <div class="detail-block"><strong>导演/编剧</strong> ${escapeHtml(p.director||"-")} / ${escapeHtml(p.writer||"-")}<br><strong>主演</strong> ${p.male1||"-"} ${p.female1?"/ "+p.female1:""}</div>
            <div class="detail-block"><strong>出品/制作</strong> ${escapeHtml(p.studio||"-")}<br><strong>豆瓣评分</strong> ${p.rating||"-"}</div>
        `;
        document.getElementById("editDetailBtn").onclick = () => { closeDetail(); openEditModal(p.id); };
        document.getElementById("deleteDetailBtn").onclick = () => { if(confirm("删除？")) deleteProject(p.id); };
        document.getElementById("detailModal").classList.add("active");
    }
    
    function closeDetail() { document.getElementById("detailModal").classList.remove("active"); }
    
    function openEditModal(id) {
        currentEditId = id;
        document.getElementById("modalTitle").innerText = id ? "编辑项目" : "添加项目";
        if(id) {
            let p = allProjects.find(x => x.id === id);
            if(p) {
                document.getElementById("projName").value = p.name;
                document.getElementById("projLevel").value = p.level;
                document.getElementById("projType").value = p.type || "";
                document.getElementById("projEpisodes").value = p.episodes || "";
                document.getElementById("projStart").value = p.start_date || "";
                document.getElementById("projEnd").value = p.end_date || "";
                document.getElementById("projAirDate").value = p.air_date || "";
                document.getElementById("projDirector").value = p.director || "";
                document.getElementById("projWriter").value = p.writer || "";
                document.getElementById("projMale1").value = p.male1 || "";
                document.getElementById("projFemale1").value = p.female1 || "";
                document.getElementById("projStudio").value = p.studio || "";
                document.getElementById("projRating").value = p.rating || "";
            }
        } else {
            document.getElementById("projName").value = "";
            document.getElementById("projLevel").value = "S";
            document.getElementById("projType").value = "";
            document.getElementById("projEpisodes").value = "";
            document.getElementById("projStart").value = "";
            document.getElementById("projEnd").value = "";
            document.getElementById("projAirDate").value = "";
            document.getElementById("projDirector").value = "";
            document.getElementById("projWriter").value = "";
            document.getElementById("projMale1").value = "";
            document.getElementById("projFemale1").value = "";
            document.getElementById("projStudio").value = "";
            document.getElementById("projRating").value = "";
        }
        document.getElementById("editModal").classList.add("active");
    }
    
    function closeEditModal() { document.getElementById("editModal").classList.remove("active"); currentEditId = null; }
    
    async function saveProject() {
        let name = document.getElementById("projName").value.trim();
        if(!name) { alert("请填写剧目名称"); return; }
        
        let newData = {
            name: name,
            level: document.getElementById("projLevel").value,
            type: document.getElementById("projType").value,
            episodes: document.getElementById("projEpisodes").value,
            start_date: document.getElementById("projStart").value,
            end_date: document.getElementById("projEnd").value,
            air_date: document.getElementById("projAirDate").value,
            director: document.getElementById("projDirector").value,
            writer: document.getElementById("projWriter").value,
            male1: document.getElementById("projMale1").value,
            female1: document.getElementById("projFemale1").value,
            studio: document.getElementById("projStudio").value,
            rating: document.getElementById("projRating").value
        };
        
        let result;
        if(currentEditId) {
            result = await supabase.from("projects").update(newData).eq("id", currentEditId);
        } else {
            result = await supabase.from("projects").insert([newData]);
        }
        
        if(result.error) {
            alert("保存失败: " + result.error.message);
        } else {
            loadData();
            closeEditModal();
        }
    }
    
    async function deleteProject(id) {
        let { error } = await supabase.from("projects").delete().eq("id", id);
        if(error) alert("删除失败: " + error.message);
        else { loadData(); closeDetail(); }
    }
    
    document.getElementById("addBtn").onclick = () => openEditModal(null);
    document.getElementById("closeEditModalBtn").onclick = closeEditModal;
    document.getElementById("saveBtn").onclick = saveProject;
    document.getElementById("closeDetailBtn").onclick = closeDetail;
    document.getElementById("levelFilter").onchange = () => { currentFilter = document.getElementById("levelFilter").value; renderTable(); };
    document.getElementById("statusFilter").onchange = () => { statusFilter = document.getElementById("statusFilter").value; renderTable(); };
    document.getElementById("resetFilters").onclick = () => {
        document.getElementById("levelFilter").value = "all";
        document.getElementById("statusFilter").value = "all";
        currentFilter = "all";
        statusFilter = "all";
        renderTable();
    };
    document.getElementById("editModal").onclick = e => { if(e.target === document.getElementById("editModal")) closeEditModal(); };
    document.getElementById("detailModal").onclick = e => { if(e.target === document.getElementById("detailModal")) closeDetail(); };
    
    loadData();
</script>
</body>
</html>
